<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocView • 500 MB File Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .dropzone {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .dropzone.active {
            background-color: #0a1729;
            border-color: #00d4ff;
            box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.2);
        }
        
        pre {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 15px;
            line-height: 1.6;
            tab-size: 4;
        }
        
        .sql-keyword {
            color: #ff79c6;
            font-weight: 600;
        }
        
        .modal {
            animation: modalPop 0.2s ease-out;
        }
    </style>
</head>
<body class="bg-[#05080f] text-white min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-[#00d4ff] text-black rounded-2xl flex items-center justify-center text-2xl font-bold">📄</div>
                <h1 class="title-font text-4xl tracking-[-1px]">DocView</h1>
                <span class="px-3 py-1 text-xs font-medium bg-[#00d4ff]/10 text-[#00d4ff] rounded-3xl border border-[#00d4ff]/30">500 MB • Client-side</span>
            </div>
            
            <button onclick="showSupportedFormats()" 
                    class="flex items-center gap-x-2 px-5 py-2.5 text-sm font-medium bg-white/10 hover:bg-white/20 rounded-3xl transition-colors">
                <span class="text-[#00d4ff]">▼</span>
                Supported Formats
            </button>
        </div>

        <!-- Upload Area -->
        <div id="dropzone" 
             class="dropzone border-2 border-dashed border-white/30 hover:border-[#00d4ff]/70 rounded-3xl h-80 flex flex-col items-center justify-center cursor-pointer relative">
            
            <input type="file" id="file-input" class="hidden">
            
            <div class="text-center z-10">
                <div class="mx-auto w-16 h-16 bg-[#00d4ff]/10 rounded-3xl flex items-center justify-center text-4xl mb-6">📤</div>
                <h3 class="text-3xl font-semibold mb-2">Drop your file here</h3>
                <p class="text-white/70">or click to browse • Maximum 500 MB</p>
                <p class="text-xs text-white/50 mt-8">.sql • .pcap • and 50 other formats</p>
            </div>
            
            <!-- Progress -->
            <div id="progress-container" class="hidden absolute bottom-8 left-1/2 -translate-x-1/2 w-96">
                <div class="flex justify-between text-xs mb-2 font-medium">
                    <span id="progress-text">Reading file…</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="h-2 bg-white/10 rounded-3xl overflow-hidden">
                    <div id="progress-bar" class="h-2 bg-[#00d4ff] w-0 transition-all duration-300"></div>
                </div>
            </div>
        </div>

        <!-- Preview Area -->
        <div id="preview-panel" class="hidden mt-8 bg-[#0a1729] border border-white/10 rounded-3xl overflow-hidden flex flex-col">
            <div class="px-8 py-5 border-b border-white/10 flex items-center justify-between bg-[#05080f]">
                <div class="flex items-center gap-x-3">
                    <span id="preview-icon" class="text-3xl"></span>
                    <div>
                        <div id="preview-filename" class="font-medium text-lg"></div>
                        <div id="preview-ext" class="text-xs font-mono text-white/50"></div>
                    </div>
                </div>
                
                <div class="flex items-center gap-x-3">
                    <button onclick="copyContent()" 
                            class="px-6 py-2 text-sm flex items-center gap-x-2 hover:bg-white/10 rounded-2xl transition-colors">
                        📋 Copy
                    </button>
                    <button onclick="closePreview()" 
                            class="px-6 py-2 text-sm bg-white/10 hover:bg-white/20 rounded-2xl transition-colors">
                        Close
                    </button>
                </div>
            </div>
            
            <!-- Full scrollable content -->
            <div id="preview-content" class="flex-1 p-8 overflow-auto max-h-[calc(100vh-280px)] bg-[#05080f]"></div>
            
            <div id="sql-notice" class="hidden px-8 py-4 bg-[#00d4ff]/10 text-xs flex items-center justify-between text-[#00d4ff]">
                <span class="font-medium">SQL syntax highlighting enabled</span>
                <span class="text-xs">UTF-8 decoded • Full scrollable view</span>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-12 text-center text-xs text-white/40">
            100% client-side • Works offline • No data leaves your browser
        </div>
    </div>

    <!-- Supported Formats Modal -->
    <div id="formats-modal" onclick="if(event.target.id === 'formats-modal') hideSupportedFormats()" 
         class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-[#0a1729] border border-white/10 rounded-3xl max-w-lg w-full mx-4 overflow-hidden">
            <div class="px-8 py-6 border-b border-white/10 flex items-center justify-between">
                <h2 class="text-2xl font-semibold">Supported Formats</h2>
                <button onclick="hideSupportedFormats()" class="text-white/70 hover:text-white text-2xl leading-none">×</button>
            </div>
            <div id="formats-list" class="p-8 max-h-[420px] overflow-y-auto grid grid-cols-2 gap-3 text-sm font-mono"></div>
        </div>
    </div>

    <script>
        // Tailwind initialization
        function initTailwind() {
            tailwind.config = { content: [], theme: { extend: {} } }
        }

        // All supported extensions (52 total)
        const supportedExtensions = [
            ".sql", ".pcap",
            ".log", ".bak", ".tmp", ".dat", ".bin",
            ".json", ".xml", ".yaml", ".yml", ".toml",
            ".ini", ".cfg", ".conf", ".properties", ".env",
            ".md", ".rst",
            ".py", ".js", ".ts", ".jsx", ".tsx",
            ".java", ".cpp", ".h", ".c", ".cs",
            ".php", ".rb", ".go", ".rs", ".swift",
            ".kt", ".lua", ".sh", ".bat", ".ps1",
            ".db", ".sqlite", ".sqlite3", ".mdb", ".accdb",
            ".dbf", ".rdb",
            ".csv", ".tsv",
            ".parquet", ".avro", ".orc",
            ".zip", ".rar", ".7z", ".tar", ".gz"
        ]

        const textExtensions = [".sql",".log",".json",".xml",".yaml",".yml",".toml",".ini",".cfg",".conf",".properties",".env",".md",".rst",".py",".js",".ts",".jsx",".tsx",".java",".cpp",".h",".c",".cs",".php",".rb",".go",".rs",".swift",".kt",".lua",".sh",".bat",".ps1",".csv",".tsv"]

        function normalizeExt(filename) {
            return filename.slice(filename.lastIndexOf('.')).toLowerCase()
        }

        function isSupportedFile(file) {
            if (!file) return false
            const ext = normalizeExt(file.name)
            return supportedExtensions.includes(ext)
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 Bytes'
            const k = 1024
            const sizes = ['Bytes', 'KB', 'MB', 'GB']
            const i = Math.floor(Math.log(bytes) / Math.log(k))
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i]
        }

        // Simple SQL syntax highlighter
        function highlightSQL(sql) {
            const keywords = /\b(SELECT|INSERT|UPDATE|DELETE|FROM|WHERE|JOIN|INNER|LEFT|RIGHT|ON|AND|OR|NOT|AS|GROUP|BY|ORDER|LIMIT|OFFSET|CREATE|TABLE|ALTER|DROP|INDEX|PRIMARY|KEY|FOREIGN|REFERENCES|VALUES|SET|INTO|CASE|WHEN|THEN|ELSE|END|UNION|ALL|DISTINCT|COUNT|SUM|AVG|MAX|MIN|HAVING|LIKE|BETWEEN|IS|NULL|TRUE|FALSE|EXISTS)\b/gi
            return sql.replace(keywords, match => `<span class="sql-keyword">${match}</span>`)
        }

        // Simple hex dump (scrollable, professional)
        function createHexDump(arrayBuffer) {
            const bytes = new Uint8Array(arrayBuffer)
            let hex = ''
            const lineLength = 16
            
            for (let i = 0; i < bytes.length; i += lineLength) {
                const chunk = bytes.slice(i, i + lineLength)
                const hexLine = Array.from(chunk).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ')
                const asciiLine = Array.from(chunk).map(b => (b >= 32 && b <= 126) ? String.fromCharCode(b) : '.').join('')
                const address = i.toString(16).padStart(8, '0').toUpperCase()
                
                hex += `<span class="text-white/40">${address}</span>  \( {hexLine.padEnd(47, ' ')}  <span class="text-white/70"> \){asciiLine}</span>\n`
            }
            return hex
        }

        function processFile(file) {
            const dropzone = document.getElementById('dropzone')
            const progressContainer = document.getElementById('progress-container')
            const progressBar = document.getElementById('progress-bar')
            const progressText = document.getElementById('progress-text')
            const progressPercent = document.getElementById('progress-percent')
            
            if (file.size > 500 * 1024 * 1024) {
                alert('File exceeds 500 MB limit.')
                return
            }
            
            if (!isSupportedFile(file)) {
                alert('This file format is not supported.\n\nPlease use one of the supported formats listed in the dropdown.')
                return
            }
            
            const ext = normalizeExt(file.name)
            const isSQL = ext === '.sql'
            
            dropzone.classList.add('opacity-30', 'pointer-events-none')
            progressContainer.classList.remove('hidden')
            
            const reader = new FileReader()
            
            let progress = 0
            const progressInterval = setInterval(() => {
                progress = Math.min(progress + Math.random() * 22, 98)
                progressBar.style.width = `${progress}%`
                progressPercent.textContent = `${Math.round(progress)}%`
            }, 45)
            
            reader.onload = function(e) {
                clearInterval(progressInterval)
                progressBar.style.width = '100%'
                progressPercent.textContent = '100%'
                
                setTimeout(() => {
                    showPreview(file, e.target.result, isSQL)
                    dropzone.classList.remove('opacity-30', 'pointer-events-none')
                    progressContainer.classList.add('hidden')
                    progressBar.style.width = '0%'
                }, 300)
            }
            
            reader.onerror = function() {
                clearInterval(progressInterval)
                alert('Unable to read the file. It may be corrupted or too large for your browser.')
                dropzone.classList.remove('opacity-30', 'pointer-events-none')
                progressContainer.classList.add('hidden')
            }
            
            // Always read as ArrayBuffer for maximum compatibility
            reader.readAsArrayBuffer(file)
        }

        function showPreview(file, arrayBuffer, isSQL) {
            const panel = document.getElementById('preview-panel')
            const filenameEl = document.getElementById('preview-filename')
            const extEl = document.getElementById('preview-ext')
            const iconEl = document.getElementById('preview-icon')
            const contentEl = document.getElementById('preview-content')
            const sqlNotice = document.getElementById('sql-notice')
            
            filenameEl.textContent = file.name
            extEl.textContent = normalizeExt(file.name).toUpperCase()
            iconEl.textContent = isSQL ? '📜' : (normalizeExt(file.name) === '.pcap' ? '📡' : '📄')
            
            contentEl.innerHTML = ''
            sqlNotice.classList.add('hidden')
            
            const ext = normalizeExt(file.name)
            
            if (isSQL) {
                // SQL: UTF-8 decode + syntax highlight + full scrollable
                sqlNotice.classList.remove('hidden')
                const decoder = new TextDecoder('utf-8', { fatal: false })
                const text = decoder.decode(arrayBuffer)
                const highlighted = highlightSQL(text)
                contentEl.innerHTML = `
                    <div class="mb-6 text-xs uppercase tracking-widest text-white/40 flex justify-between">
                        <span>SQL FILE • ${formatSize(file.size)}</span>
                        <span class="text-emerald-400">Fully decoded • Scrollable</span>
                    </div>
                    <pre class="bg-[#05080f] p-8 rounded-2xl border border-white/10 overflow-auto leading-relaxed text-white/90">${highlighted}</pre>
                `
            } else {
                const isTextFile = textExtensions.includes(ext)
                
                if (isTextFile) {
                    // Text file: UTF-8 decode
                    const decoder = new TextDecoder('utf-8', { fatal: false })
                    const text = decoder.decode(arrayBuffer)
                    contentEl.innerHTML = `
                        <div class="mb-6 text-xs uppercase tracking-widest text-white/40">TEXT FILE • ${formatSize(file.size)} • UTF-8 decoded</div>
                        <pre class="bg-[#05080f] p-8 rounded-2xl border border-white/10 overflow-auto leading-relaxed text-white/90">${text}</pre>
                    `
                } else {
                    // Binary file (.pcap, .zip, etc.): professional hex dump
                    const hexContent = createHexDump(arrayBuffer)
                    contentEl.innerHTML = `
                        <div class="mb-6 text-xs uppercase tracking-widest text-amber-400 flex items-center gap-x-2">
                            <span>BINARY FILE</span>
                            <span class="flex-1 h-px bg-white/10"></span>
                            <span>${formatSize(file.size)} • Scrollable hex view</span>
                        </div>
                        <pre class="bg-[#05080f] p-8 rounded-2xl border border-white/10 overflow-auto leading-relaxed text-white/90 font-light">${hexContent}</pre>
                        <div class="mt-6 text-xs text-white/50 text-center">Full raw data • No external parsers used</div>
                    `
                }
            }
            
            panel.classList.remove('hidden')
            panel.scrollIntoView({ behavior: 'smooth' })
        }

        function copyContent() {
            const pre = document.querySelector('#preview-content pre')
            if (!pre) return
            const text = pre.textContent || pre.innerText
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('#preview-panel button')
                const original = btn.innerHTML
                btn.innerHTML = '✅ Copied'
                setTimeout(() => { btn.innerHTML = original }, 1600)
            })
        }

        function closePreview() {
            document.getElementById('preview-panel').classList.add('hidden')
        }

        function showSupportedFormats() {
            const container = document.getElementById('formats-list')
            container.innerHTML = ''
            
            supportedExtensions.forEach(ext => {
                const div = document.createElement('div')
                div.className = 'px-4 py-3 bg-white/5 hover:bg-white/10 rounded-2xl text-center transition-colors'
                div.textContent = ext
                container.appendChild(div)
            })
            
            document.getElementById('formats-modal').classList.remove('hidden')
            document.getElementById('formats-modal').classList.add('flex')
        }

        function hideSupportedFormats() {
            const modal = document.getElementById('formats-modal')
            modal.classList.add('hidden')
            modal.classList.remove('flex')
        }

        // Drag & drop + click handlers
        function setupDropzone() {
            const dropzone = document.getElementById('dropzone')
            const fileInput = document.getElementById('file-input')
            
            dropzone.addEventListener('click', () => fileInput.click())
            
            fileInput.addEventListener('change', e => {
                if (e.target.files && e.target.files[0]) {
                    processFile(e.target.files[0])
                    fileInput.value = ''
                }
            })
            
            dropzone.addEventListener('dragover', e => {
                e.preventDefault()
                dropzone.classList.add('active')
            })
            
            dropzone.addEventListener('dragleave', () => dropzone.classList.remove('active'))
            
            dropzone.addEventListener('drop', e => {
                e.preventDefault()
                dropzone.classList.remove('active')
                if (e.dataTransfer.files && e.dataTransfer.files.length) {
                    processFile(e.dataTransfer.files[0])
                }
            })
        }

        // Initialize
        window.onload = function() {
            initTailwind()
            setupDropzone()
            
            console.log('%c✅ DocView initialized • Full scrollable previews • UTF-8 decoding enabled', 'color:#00d4ff; font-family:monospace')
        }
    </script>
</body>
                        </html>
